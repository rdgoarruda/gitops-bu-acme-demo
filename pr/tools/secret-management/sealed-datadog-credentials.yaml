# SealedSecret para PR — encriptado com a chave pública do cluster bu-acme-pr
# A chave do PR é DIFERENTE da do HO: o mesmo arquivo do HO não funciona aqui.
# kubeseal --context kind-bu-acme-pr ...

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: datadog-credentials
  namespace: bu-acme-workloads
spec:
  encryptedData:
    api-key: AgBy8hW3...  # encriptado com a chave do cluster bu-acme-pr
    app-key: AgCx9iZ4...
  template:
    metadata:
      name: datadog-credentials
      namespace: bu-acme-workloads
    type: Opaque
