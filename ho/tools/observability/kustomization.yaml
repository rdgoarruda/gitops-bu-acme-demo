apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ── Observability — escolha da BU-ACME ────────────────────────────────────
#
# BU-ACME optou por Datadog.
# BU-Y poderia ter aqui dynatrace/, newrelic/, prometheus-stack/, etc.
# Cada BU declara e gerencia seu próprio agente neste repositório.
# O time de plataforma NÃO impõe a ferramenta — apenas o namespace e as cotas.

resources:
  - datadog-agent.yaml
