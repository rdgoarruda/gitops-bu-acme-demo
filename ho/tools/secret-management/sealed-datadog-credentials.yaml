# SealedSecret — credenciais do Datadog encriptadas para o HO
#
# COMO GERAR:
#   1. Instalar kubeseal: https://github.com/bitnami-labs/sealed-secrets
#   2. Criar o Secret normal (NUNCA commitar este passo):
#        kubectl create secret generic datadog-credentials \
#          --from-literal=api-key=SUA_API_KEY_REAL \
#          --from-literal=app-key=SUA_APP_KEY_REAL \
#          --dry-run=client -o yaml | \
#        kubeseal --context kind-bu-acme-ho --format yaml \
#          > sealed-datadog-credentials.yaml
#   3. Commitar o arquivo gerado (é seguro — só o cluster consegue decriptar)
#
# O encryptedData abaixo é ilustrativo (não é uma chave real).

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: datadog-credentials
  namespace: bu-acme-workloads
  annotations:
    # "strict" = vinculado a este namespace + name específicos
    # "namespace-wide" = qualquer secret neste namespace
    # "cluster-wide" = qualquer namespace (não recomendado)
    sealedsecrets.bitnami.com/cluster-wide: "false"
spec:
  encryptedData:
    # Valores gerados pelo kubeseal com a chave pública do cluster bu-acme-ho
    api-key: AgBy8hW3...  # valor real gerado pelo kubeseal
    app-key: AgCx9iZ4...  # valor real gerado pelo kubeseal
  template:
    metadata:
      name: datadog-credentials
      namespace: bu-acme-workloads
    type: Opaque
